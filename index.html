<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedulr - Task Scheduler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #333; }
    h1 { color: #00d4ff; font-size: 2em; }
    .badge { background: #00d4ff; color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; }
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
    .card { background: #1a1a3e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.2em; }
    .task { background: #252550; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .task.disabled { opacity: 0.5; }
    .task-name { font-weight: bold; margin-bottom: 5px; }
    .task-schedule { color: #888; font-family: monospace; font-size: 0.9em; }
    .task-status { font-size: 0.8em; padding: 3px 10px; border-radius: 4px; }
    .status-success { background: #00ff8822; color: #00ff88; }
    .status-failed { background: #ff444422; color: #ff4444; }
    .btn { background: #00d4ff; color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
    .btn:hover { background: #00ffff; transform: translateY(-2px); }
    .btn-danger { background: #ff4444; color: #fff; }
    .btn-small { padding: 5px 10px; font-size: 0.8em; }
    .log-entry { background: #1a1a3e; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-family: monospace; font-size: 0.85em; }
    .log-header { display: flex; justify-content: space-between; margin-bottom: 5px; color: #888; }
    .log-output { color: #aaa; white-space: pre-wrap; word-break: break-all; max-height: 100px; overflow: hidden; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #888; }
    input, select, textarea { width: 100%; background: #252550; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; font-family: inherit; }
    textarea { min-height: 80px; }
    .toggle { position: relative; width: 50px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 26px; transition: 0.3s; }
    .slider:before { content: ""; position: absolute; width: 20px; height: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider { background: #00d4ff; }
    input:checked + .slider:before { transform: translateX(24px); }
    .empty { text-align: center; padding: 40px; color: #666; }
    .cron-help { font-size: 0.8em; color: #666; margin-top: 5px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Schedulr</h1>
      <span class="badge">Beta</span>
    </header>

    <div class="grid">
      <div class="main">
        <div class="card">
          <h2>📋 Tasks</h2>
          <div id="tasks">Loading...</div>
        </div>

        <div class="card">
          <h2>📜 Recent Logs</h2>
          <div id="logs">Loading...</div>
        </div>
      </div>

      <div class="sidebar">
        <div class="card">
          <h2>+ New Task</h2>
          <form id="addForm">
            <div class="form-group">
              <label>Name</label>
              <input type="text" name="name" placeholder="Daily Cleanup" required>
            </div>
            <div class="form-group">
              <label>Type</label>
              <select name="type">
                <option value="shell">Shell Command</option>
                <option value="http">HTTP Request</option>
              </select>
            </div>
            <div class="form-group" id="configShell">
              <label>Command</label>
              <textarea name="command" placeholder="echo 'Hello' >> /tmp/log.txt"></textarea>
            </div>
            <div class="form-group" id="configHttp" style="display:none;">
              <label>URL</label>
              <input type="text" name="url" placeholder="https://api.example.com/cleanup">
            </div>
            <div class="form-group">
              <label>Schedule (Cron)</label>
              <input type="text" name="schedule" value="0 * * * *" placeholder="0 * * * *">
              <div class="cron-help">Format: sec min hour day month dow</div>
            </div>
            <button type="submit" class="btn">Add Task</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    
    async function loadTasks() {
      const res = await fetch('/api/tasks');
      const data = await res.json();
      const container = document.getElementById('tasks');
      
      if (data.tasks.length === 0) {
        container.innerHTML = '<div class="empty">No tasks yet. Create one! 👈</div>';
        return;
      }
      
      container.innerHTML = data.tasks.map(t => `
        <div class="task ${t.enabled ? '' : 'disabled'}">
          <div>
            <div class="task-name">${t.name}</div>
            <div class="task-schedule">${t.schedule}</div>
            ${t.lastRun ? `<div style="font-size:0.8em;color:#888;margin-top:5px;">Last: ${new Date(t.lastRun).toLocaleString()} ${t.lastStatus ? `<span class="task-status status-${t.lastStatus}">${t.lastStatus}</span>` : ''}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <label class="toggle">
              <input type="checkbox" ${t.enabled ? 'checked' : ''} onchange="toggleTask(${t.id}, this.checked)">
              <span class="slider"></span>
            </label>
            <button class="btn btn-small" onclick="runNow(${t.id})">▶</button>
            <button class="btn btn-danger btn-small" onclick="deleteTask(${t.id})">✕</button>
          </div>
        </div>
      `).join('');
    }
    
    async function loadLogs() {
      const res = await fetch('/api/logs');
      const data = await res.json();
      const container = document.getElementById('logs');
      
      if (data.logs.length === 0) {
        container.innerHTML = '<div class="empty">No logs yet</div>';
        return;
      }
      
      container.innerHTML = data.logs.slice(0, 10).map(l => `
        <div class="log-entry">
          <div class="log-header">
            <span>Task #${l.taskId}</span>
            <span>${new Date(l.timestamp).toLocaleString()} - ${l.duration}ms</span>
            <span class="task-status status-${l.status}">${l.status}</span>
          </div>
          <div class="log-output">${l.output.substring(0, 200)}</div>
        </div>
      `).join('');
    }
    
    async function toggleTask(id, enabled) {
      await fetch(`/api/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled })
      });
      loadTasks();
    }
    
    async function runNow(id) {
      await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      loadTasks();
      loadLogs();
    }
    
    async function deleteTask(id) {
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }
    
    document.getElementById('addForm').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const data = {
        name: fd.get('name'),
        type: fd.get('type'),
        schedule: fd.get('schedule'),
        config: fd.get('type') === 'shell' 
          ? { command: fd.get('command') }
          : { url: fd.get('url'), method: 'POST' }
      };
      
      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      e.target.reset();
      e.target.elements.schedule.value = '0 * * * *';
      loadTasks();
    };
    
    document.querySelector('[name=type]').onchange = (e) => {
      document.getElementById('configShell').style.display = e.target.value === 'shell' ? 'block' : 'none';
      document.getElementById('configHttp').style.display = e.target.value === 'http' ? 'block' : 'none';
    };
    
    // Initial load
    loadTasks();
    loadLogs();
    setInterval(() => { loadTasks(); loadLogs(); }, 5000);
  </script>
</body>
</html>
